# EchoMind persona template.
# Schema is shared with agent-personas — keep these fields in lockstep.
# The persona-capture skill is the canonical author/editor for these files.

schema_version: 1

# Job role this persona represents (e.g. "General Manager", "BDC Agent")
role: Example Role

# At least one professional goal the persona is trying to accomplish
goals:
  - Goal 1
  - Goal 2

# Daily tasks this persona performs — what their workday actually looks like
daily_workflow:
  - Task 1
  - Task 2

# At least one frustration or challenge in their current workflow
pain_points:
  - Pain point 1

# Terms this persona uses naturally — keeps language authentic, anti-jargon
vocabulary:
  - "term 1"
  - "term 2"

# Technical comfort: low | medium | high
tech_comfort: medium

# Things this persona dislikes — surfaces in feedback tone
pet_peeves:
  - Pet peeve 1

# Questions this persona asks when reviewing a UI or interacting with a product.
# This is the most important field for EchoMind chat — it shapes how the persona
# evaluates whatever you show or describe to them.
review_lens:
  - Question 1
  - Question 2
